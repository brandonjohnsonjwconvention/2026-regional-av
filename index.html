<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2026 Regional Convention AV Portal</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f7fa;
    color: #222;
}

header {
    background: #1f5fae;
    color: white;
    padding: 30px 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 26px;
}

header p {
    margin-top: 8px;
}

.card {
    background: white;
    margin: 15px;
    padding: 20px;
    border-radius: 18px;
    box-shadow: 0 3px 10px rgba(0,0,0,.08);
}

.countdown {
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    color: #1f5fae;
}

.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.department {
    text-align: center;
    padding: 20px 10px;
    border-radius: 16px;
    background: #eef5ff;
    font-size: 18px;
}

.icon {
    font-size: 32px;
    display: block;
    margin-bottom: 8px;
}

.notice {
    border-left: 5px solid #1f5fae;
    padding-left: 12px;
}

footer {
    text-align: center;
    padding: 20px;
    color: #666;
}
</style>

</head>

<body>

<header>
<h1>2026 Regional Convention</h1>
<p>Athens, Georgia<br>AV Operations Portal</p>
</header>


<div class="card">

<h2>⏳ Next Event</h2>

<div class="countdown">
Coming Soon
</div>

<p style="text-align:center;">
Convention schedule will appear here.
</p>

</div>


<div class="card">

<h2>Departments</h2>

<div class="grid">

<div class="department">
<span class="icon">🎤</span>
Audio
</div>

<div class="department">
<span class="icon">📹</span>
Video
</div>

<div class="department">
<span class="icon">💻</span>
IT
</div>

<div class="department">
<span class="icon">🎙</span>
Platform
</div>

<div class="department">
<span class="icon">💄</span>
Makeup
</div>

</div>

</div>


<div class="card">

<h2>📢 Announcements</h2>

<div class="notice">
New announcements will appear here.
</div>

</div>


<footer>
2026 Regional Convention AV Department
</footer>


</body>
</html>
